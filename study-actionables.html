<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actionables</title>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3250;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #7c6af7;
      --accent2:  #ec4899;
      --green:    #34d399;
      --red:      #f87171;
      --orange:   #fb923c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem 2rem 4rem;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      max-width: 1200px; margin: 0 auto 2rem;
      display: flex; gap: 0.4rem; align-items: center;
    }
    .nav-link {
      padding: 0.42rem 1rem; border-radius: 8px; font-size: 0.85rem;
      font-weight: 600; text-decoration: none; color: var(--muted);
      border: 1px solid transparent; transition: all 0.15s;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border); }
    .nav-link.active { background: var(--surface); color: var(--accent2); border-color: var(--border); }
    .nav-sep { color: var(--border); font-size: 1.1rem; }

    /* ── Page shell ── */
    .page { max-width: 1200px; margin: 0 auto; }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.4rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; }
    .page-subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem; }

    /* ── Top bar (filters + add) ── */
    .top-bar {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .filter-pills { display: flex; gap: 0.35rem; }
    .pill {
      padding: 0.32rem 0.85rem; border-radius: 99px; font-size: 0.8rem;
      font-weight: 600; border: 1px solid var(--border);
      background: none; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .pill:hover { border-color: var(--muted); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .spacer { flex: 1; }

    .btn-add-proj {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.42rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add-proj:hover { opacity: 0.85; }

    /* ── Focus strip ── */
    .focus-strip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 1.5rem;
    }
    .focus-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--accent2); margin-bottom: 0.55rem;
    }
    .focus-items { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .focus-chip {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.28rem 0.7rem; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      border: 1px solid; cursor: pointer; transition: opacity 0.15s;
    }
    .focus-chip:hover { opacity: 0.75; }
    .focus-chip.done { opacity: 0.4; text-decoration: line-through; }
    .focus-empty { font-size: 0.82rem; color: var(--muted); }

    /* ── Projects grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
      align-items: start;
    }

    /* ── Project card ── */
    .proj-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .proj-card:hover { border-color: #3e4470; }

    .proj-header {
      padding: 1rem 1rem 0.8rem;
      border-top: 3px solid var(--proj-color, var(--accent));
    }
    .proj-title-row {
      display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.6rem;
    }
    .proj-icon { font-size: 1.2rem; line-height: 1; }
    .proj-name {
      font-size: 1rem; font-weight: 800; flex: 1;
      background: none; border: none; color: var(--text);
      font-family: inherit; cursor: text; padding: 0;
      outline: none;
    }
    .proj-name:focus { color: var(--accent2); }
    .proj-menu-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0.1rem 0.3rem; border-radius: 5px;
      transition: all 0.15s; line-height: 1;
    }
    .proj-menu-btn:hover { background: var(--surface2); color: var(--text); }

    .proj-progress-row {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .proj-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .proj-bar { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .proj-count { font-size: 0.72rem; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ── Task list ── */
    .task-list { padding: 0 0.75rem; }
    .task-item {
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .task-item:last-child { border-bottom: none; }

    .task-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.25rem; min-height: 38px;
    }

    /* Custom checkbox */
    .task-check {
      width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: none; cursor: pointer;
      appearance: none; -webkit-appearance: none; position: relative;
      transition: all 0.15s;
    }
    .task-check:hover { border-color: var(--proj-color, var(--accent)); }
    .task-check:checked {
      background: var(--proj-color, var(--accent));
      border-color: var(--proj-color, var(--accent));
    }
    .task-check:checked::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.65rem; font-weight: 900;
    }

    .task-text {
      flex: 1; font-size: 0.87rem; line-height: 1.35;
      background: none; border: none; color: var(--text);
      font-family: inherit; cursor: text; padding: 0;
      outline: none; min-width: 0;
    }
    .task-text:focus { color: var(--accent2); }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .task-priority {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
    }
    .priority-high  { background: var(--red); }
    .priority-med   { background: var(--orange); }
    .priority-low   { background: var(--border); }

    .task-due {
      font-size: 0.68rem; color: var(--muted); white-space: nowrap;
      background: none; border: none; font-family: inherit; cursor: pointer;
      padding: 0; outline: none;
    }
    .task-due.overdue { color: var(--red); }
    .task-due.soon    { color: var(--orange); }

    .task-expand-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.65rem; padding: 0.1rem 0.2rem; transition: transform 0.15s;
      flex-shrink: 0; line-height: 1;
    }
    .task-expand-btn.open { transform: rotate(90deg); }
    .task-del-btn {
      background: none; border: none; color: transparent; cursor: pointer;
      font-size: 0.75rem; padding: 0.1rem 0.2rem; flex-shrink: 0;
      transition: color 0.15s; line-height: 1;
    }
    .task-row:hover .task-del-btn { color: var(--muted); }
    .task-del-btn:hover { color: var(--red) !important; }

    /* ── Subtasks ── */
    .subtask-list { padding-left: 1.8rem; }
    .subtask-item {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.35rem 0.25rem;
      border-bottom: 1px solid #1e2235;
    }
    .subtask-item:last-child { border-bottom: none; }
    .subtask-check {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
      border: 1.5px solid var(--border); background: none; cursor: pointer;
      appearance: none; -webkit-appearance: none; position: relative; transition: all 0.15s;
    }
    .subtask-check:hover { border-color: var(--proj-color, var(--accent)); }
    .subtask-check:checked { background: var(--proj-color, var(--accent)); border-color: var(--proj-color, var(--accent)); }
    .subtask-check:checked::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 0.55rem; font-weight: 900;
    }
    .subtask-text {
      flex: 1; font-size: 0.8rem; color: var(--text);
      background: none; border: none; font-family: inherit;
      cursor: text; padding: 0; outline: none;
    }
    .subtask-text:focus { color: var(--accent2); }
    .subtask-done .subtask-text { text-decoration: line-through; color: var(--muted); }
    .subtask-del {
      background: none; border: none; color: transparent; cursor: pointer;
      font-size: 0.7rem; padding: 0 0.2rem; transition: color 0.15s;
    }
    .subtask-item:hover .subtask-del { color: var(--muted); }
    .subtask-del:hover { color: var(--red) !important; }

    .add-subtask-row {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.25rem 0.3rem 0;
    }
    .add-subtask-input {
      flex: 1; background: none; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 0.78rem; font-family: inherit;
      padding: 0.1rem 0; outline: none;
    }
    .add-subtask-input::placeholder { color: var(--muted); }
    .add-subtask-input:focus { border-bottom-color: var(--accent); }

    /* ── Add task row ── */
    .add-task-area {
      padding: 0.65rem 1rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .add-task-inp {
      flex: 1; min-width: 120px;
      background: none; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 0.85rem; font-family: inherit;
      padding: 0.25rem 0; outline: none;
    }
    .add-task-inp::placeholder { color: var(--muted); }
    .add-task-inp:focus { border-bottom-color: var(--accent); }
    .add-task-opts { display: flex; gap: 0.35rem; align-items: center; }

    .pri-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .pri-btn:hover { opacity: 0.75; }
    .pri-btn.selected { border-color: #fff; transform: scale(1.15); }
    .pri-high { background: var(--red); }
    .pri-med  { background: var(--orange); }
    .pri-none { background: var(--border); }

    .due-inp {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; border-radius: 6px;
      padding: 0.2rem 0.4rem; font-family: inherit; cursor: pointer; outline: none;
    }
    .due-inp:focus { border-color: var(--accent); color: var(--text); }

    .add-task-btn {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-size: 1.1rem; line-height: 1; padding: 0.1rem; transition: opacity 0.15s;
    }
    .add-task-btn:hover { opacity: 0.7; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 1rem;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 420px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.1rem; }
    .modal-inp {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.9rem;
      font-family: inherit; padding: 0.6rem 0.8rem; outline: none; margin-bottom: 1rem;
    }
    .modal-inp:focus { border-color: var(--accent); }
    .color-swatches { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .swatch {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; transition: transform 0.12s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.picked { border-color: #fff; transform: scale(1.2); }
    .emoji-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .emoji-opt {
      font-size: 1.3rem; cursor: pointer; padding: 0.2rem;
      border-radius: 8px; border: 2px solid transparent; transition: all 0.12s;
    }
    .emoji-opt:hover { background: var(--surface2); }
    .emoji-opt.picked { border-color: var(--accent2); background: var(--surface2); }
    .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
    .btn-cancel {
      padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.85rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
    }
    .btn-confirm {
      padding: 0.45rem 1.1rem; border-radius: 8px; font-size: 0.85rem;
      font-weight: 700; background: var(--accent); color: #fff;
      border: none; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-confirm:hover { opacity: 0.85; }

    /* ── Proj menu dropdown ── */
    .proj-menu-wrap { position: relative; }
    .proj-dropdown {
      position: absolute; right: 0; top: calc(100% + 4px); z-index: 100;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.35rem; min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: modalIn 0.12s ease;
    }
    .dd-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.7rem; border-radius: 7px;
      font-size: 0.82rem; cursor: pointer; color: var(--text);
      transition: background 0.1s; white-space: nowrap;
    }
    .dd-item:hover { background: var(--surface2); }
    .dd-item.danger { color: var(--red); }

    /* ── Empty state ── */
    .proj-empty {
      padding: 1rem 1rem 0.75rem; font-size: 0.82rem; color: var(--muted);
      text-align: center; font-style: italic;
    }

    /* ── Add project placeholder card ── */
    .add-proj-card {
      border: 2px dashed var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      min-height: 140px; cursor: pointer; color: var(--muted);
      font-size: 0.85rem; gap: 0.4rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-proj-card:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }
    .task-item, .proj-card { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>

<nav>
  <a class="nav-link" href="study-tracker.html">⏱ Tracker</a>
  <span class="nav-sep">|</span>
  <a class="nav-link" href="study-planner.html">📅 Planner</a>
  <span class="nav-sep">|</span>
  <a class="nav-link active" href="study-actionables.html">✅ Actionables</a>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Actionables</h1>
    </div>
    <button class="btn-add-proj" onclick="openAddProject()">＋ New Project</button>
  </div>
  <p class="page-subtitle">Track what you need to get done, broken down by project.</p>

  <!-- Focus strip: high-priority tasks across all projects -->
  <div class="focus-strip" id="focusStrip"></div>

  <!-- Filter bar -->
  <div class="top-bar">
    <div class="filter-pills">
      <button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill" onclick="setFilter('active',this)">Active</button>
      <button class="pill" onclick="setFilter('done',this)">Done</button>
    </div>
  </div>

  <!-- Projects grid -->
  <div class="projects-grid" id="projectsGrid"></div>
</div>

<!-- Add/Edit Project Modal -->
<div class="modal-overlay" id="projModal" style="display:none" onclick="if(event.target===this)closeProjModal()">
  <div class="modal">
    <h3 id="projModalTitle">New Project</h3>
    <div class="emoji-row" id="emojiRow"></div>
    <input class="modal-inp" id="projNameInp" placeholder="Project name…" maxlength="32" />
    <div class="color-swatches" id="colorSwatches"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProjModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmProject()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── Storage ──
  const STORE_KEY = 'actionables_v1';

  const DEFAULT_PROJECTS = [
    { id:'proj_pers', name:'Personal', icon:'✨', color:'#60a5fa', tasks:[] },
    { id:'proj_study', name:'Study', icon:'📚', color:'#a78bfa', tasks:[] },
  ];

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { projects: DEFAULT_PROJECTS }; }
    catch { return { projects: DEFAULT_PROJECTS }; }
  }
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

  let data   = load();
  let filter = 'all';

  // ── Helpers ──
  function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  function dueCls(dateStr) {
    if (!dateStr) return '';
    const diff = (new Date(dateStr) - new Date()) / 86400000;
    if (diff < 0)  return 'overdue';
    if (diff < 3)  return 'soon';
    return '';
  }
  function fmtDue(dateStr) {
    if (!dateStr) return '';
    const d    = new Date(dateStr);
    const diff = Math.ceil((d - new Date()) / 86400000);
    if (diff === 0)  return 'today';
    if (diff === 1)  return 'tomorrow';
    if (diff === -1) return 'yesterday';
    if (diff < 0)    return `${-diff}d ago`;
    if (diff < 7)    return `in ${diff}d`;
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function hexAlpha(hex, a) {
    if (!hex.startsWith('#')) return hex;
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // ── Filter ──
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  }

  // ── Focus strip ──
  function renderFocusStrip() {
    const el = document.getElementById('focusStrip');
    const highPrio = [];
    data.projects.forEach(proj => {
      proj.tasks.filter(t => !t.done && (t.priority === 'high' || dueCls(t.due) === 'overdue' || dueCls(t.due) === 'soon'))
        .forEach(t => highPrio.push({ t, proj }));
    });
    if (!highPrio.length) {
      el.innerHTML = `<div class="focus-label">⚡ Today's Focus</div><div class="focus-empty">No urgent tasks — you're on top of it 🎉</div>`;
      return;
    }
    el.innerHTML = `<div class="focus-label">⚡ Today's Focus — ${highPrio.length} item${highPrio.length>1?'s':''} need attention</div>
      <div class="focus-items">${highPrio.map(({t, proj}) => `
        <div class="focus-chip ${t.done?'done':''}"
             style="color:${proj.color};border-color:${proj.color};background:${hexAlpha(proj.color,0.1)}"
             onclick="toggleTaskFromFocus('${proj.id}','${t.id}')">
          ${proj.icon} ${t.text}${t.due ? ` · <span style="font-weight:400;opacity:0.7">${fmtDue(t.due)}</span>` : ''}
        </div>`).join('')}
      </div>`;
  }

  function toggleTaskFromFocus(projId, taskId) {
    const proj = data.projects.find(p => p.id === projId);
    if (!proj) return;
    const task = proj.tasks.find(t => t.id === taskId);
    if (task) { task.done = !task.done; save(); renderAll(); }
  }

  // ── Render all ──
  function renderAll() {
    renderFocusStrip();
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = '';
    data.projects.forEach(proj => grid.appendChild(buildProjCard(proj)));
    // Add project placeholder card
    const addCard = document.createElement('div');
    addCard.className = 'add-proj-card';
    addCard.innerHTML = '＋ New Project';
    addCard.onclick = openAddProject;
    grid.appendChild(addCard);
  }

  function buildProjCard(proj) {
    const tasks = proj.tasks || [];
    const visible = filter === 'all'    ? tasks
                  : filter === 'active' ? tasks.filter(t => !t.done)
                  : tasks.filter(t => t.done);
    const doneCount  = tasks.filter(t => t.done).length;
    const totalCount = tasks.length;
    const pct = totalCount ? Math.round(doneCount / totalCount * 100) : 0;

    const card = document.createElement('div');
    card.className = 'proj-card';
    card.style.setProperty('--proj-color', proj.color);

    // Header
    const header = document.createElement('div');
    header.className = 'proj-header';
    header.innerHTML = `
      <div class="proj-title-row">
        <span class="proj-icon">${proj.icon}</span>
        <input class="proj-name" value="${escHtml(proj.name)}" maxlength="32"
               onchange="renameProject('${proj.id}',this.value)"
               onblur="renameProject('${proj.id}',this.value)" />
        <div class="proj-menu-wrap">
          <button class="proj-menu-btn" onclick="toggleMenu(event,'${proj.id}')">···</button>
        </div>
      </div>
      <div class="proj-progress-row">
        <div class="proj-bar-wrap">
          <div class="proj-bar" style="width:${pct}%;background:${proj.color}"></div>
        </div>
        <span class="proj-count">${doneCount}/${totalCount}</span>
      </div>`;
    card.appendChild(header);

    // Task list
    const listWrap = document.createElement('div');
    listWrap.className = 'task-list';

    if (visible.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'proj-empty';
      empty.textContent = filter === 'done' ? 'No completed tasks yet.' : 'No tasks yet — add one below.';
      listWrap.appendChild(empty);
    } else {
      visible.forEach(task => listWrap.appendChild(buildTaskItem(proj, task)));
    }

    card.appendChild(listWrap);

    // Add task area
    const addArea = document.createElement('div');
    addArea.className = 'add-task-area';

    let selPriority = '';
    addArea.innerHTML = `
      <input class="add-task-inp" placeholder="Add task…" maxlength="120"
             onkeydown="if(event.key==='Enter')addTask('${proj.id}',this)" />
      <div class="add-task-opts">
        <div class="pri-btn pri-high" title="High priority" onclick="togglePri(this,'high')"></div>
        <div class="pri-btn pri-med"  title="Medium"        onclick="togglePri(this,'med')"></div>
        <div class="pri-btn pri-none" title="No priority"   onclick="togglePri(this,'')"></div>
        <input class="due-inp" type="date" title="Due date" />
      </div>
      <button class="add-task-btn" onclick="addTaskFromArea(this,'${proj.id}')">＋</button>`;

    // Priority toggle helper stored on element
    addArea.querySelectorAll('.pri-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        addArea.querySelectorAll('.pri-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.toggle('selected');
        addArea._priority = btn.classList.contains('selected') ? btn.dataset.p : '';
      });
      btn.dataset.p = btn.classList.contains('pri-high') ? 'high' : btn.classList.contains('pri-med') ? 'med' : '';
    });

    card.appendChild(addArea);
    return card;
  }

  function buildTaskItem(proj, task) {
    const wrap = document.createElement('div');
    wrap.className = 'task-item' + (task.done ? ' done' : '');

    const row = document.createElement('div');
    row.className = 'task-row';
    row.style.setProperty('--proj-color', proj.color);

    const hasSubs = task.subtasks && task.subtasks.length > 0;
    const priCls  = task.priority === 'high' ? 'priority-high' : task.priority === 'med' ? 'priority-med' : 'priority-low';
    const dueTxt  = fmtDue(task.due);
    const dueCl   = dueCls(task.due);

    row.innerHTML = `
      <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''}
             style="--proj-color:${proj.color}"
             onchange="toggleTask('${proj.id}','${task.id}',this.checked)" />
      <input class="task-text" value="${escHtml(task.text)}" maxlength="200"
             onchange="editTask('${proj.id}','${task.id}','text',this.value)"
             onblur="editTask('${proj.id}','${task.id}','text',this.value)" />
      <div class="task-priority ${priCls}" title="Click to cycle priority"
           onclick="cyclePriority('${proj.id}','${task.id}')"></div>
      ${task.due ? `<span class="task-due ${dueCl}" title="${task.due}">${dueTxt}</span>` : ''}
      <button class="task-expand-btn ${task._expanded ? 'open' : ''}"
              onclick="toggleExpand('${proj.id}','${task.id}',this)">▶</button>
      <button class="task-del-btn" onclick="deleteTask('${proj.id}','${task.id}')">✕</button>`;

    wrap.appendChild(row);

    // Subtasks section (always rendered, shown/hidden)
    const subWrap = document.createElement('div');
    subWrap.style.display = task._expanded ? 'block' : 'none';

    const subList = document.createElement('div');
    subList.className = 'subtask-list';
    subList.style.setProperty('--proj-color', proj.color);

    (task.subtasks || []).forEach(sub => {
      const subRow = document.createElement('div');
      subRow.className = 'subtask-item' + (sub.done ? ' subtask-done' : '');
      subRow.innerHTML = `
        <input type="checkbox" class="subtask-check" ${sub.done ? 'checked' : ''}
               style="--proj-color:${proj.color}"
               onchange="toggleSub('${proj.id}','${task.id}','${sub.id}',this.checked)" />
        <input class="subtask-text" value="${escHtml(sub.text)}"
               onchange="editSub('${proj.id}','${task.id}','${sub.id}',this.value)"
               onblur="editSub('${proj.id}','${task.id}','${sub.id}',this.value)" />
        <button class="subtask-del" onclick="deleteSub('${proj.id}','${task.id}','${sub.id}')">✕</button>`;
      subList.appendChild(subRow);
    });

    // Add subtask input
    const addSubRow = document.createElement('div');
    addSubRow.className = 'add-subtask-row';
    addSubRow.style.paddingLeft = '0';
    addSubRow.innerHTML = `
      <input class="add-subtask-input" placeholder="＋ Add subtask…"
             onkeydown="if(event.key==='Enter')addSubtask('${proj.id}','${task.id}',this)" />`;
    subList.appendChild(addSubRow);
    subWrap.appendChild(subList);
    wrap.appendChild(subWrap);

    return wrap;
  }

  // ── Task actions ──
  function toggleTask(projId, taskId, done) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (task) { task.done = done; save(); renderAll(); }
  }

  function editTask(projId, taskId, field, val) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (task && task[field] !== val) { task[field] = val; save(); }
  }

  function cyclePriority(projId, taskId) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (!task) return;
    const cycle = { '': 'high', 'high': 'med', 'med': '' };
    task.priority = cycle[task.priority || ''] || '';
    save(); renderAll();
  }

  function toggleExpand(projId, taskId, btn) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (!task) return;
    task._expanded = !task._expanded;
    save(); renderAll();
  }

  function deleteTask(projId, taskId) {
    const proj = data.projects.find(p => p.id === projId);
    if (proj) { proj.tasks = proj.tasks.filter(t => t.id !== taskId); save(); renderAll(); }
  }

  function addTask(projId, inp) {
    const text = inp.value.trim();
    if (!text) return;
    const proj = data.projects.find(p => p.id === projId);
    if (!proj) return;
    proj.tasks.push({ id: uid(), text, done: false, priority: '', due: '', subtasks: [], _expanded: false });
    inp.value = '';
    save(); renderAll();
  }

  function addTaskFromArea(btn, projId) {
    const area = btn.closest('.add-task-area');
    const inp  = area.querySelector('.add-task-inp');
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    const pri  = area._priority || '';
    const due  = area.querySelector('.due-inp').value;
    const proj = data.projects.find(p => p.id === projId);
    if (!proj) return;
    proj.tasks.push({ id: uid(), text, done: false, priority: pri, due, subtasks: [], _expanded: false });
    inp.value = '';
    area._priority = '';
    area.querySelectorAll('.pri-btn').forEach(b => b.classList.remove('selected'));
    area.querySelector('.due-inp').value = '';
    save(); renderAll();
  }

  // ── Subtask actions ──
  function toggleSub(projId, taskId, subId, done) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    const sub  = task?.subtasks.find(s => s.id === subId);
    if (sub) { sub.done = done; save(); renderAll(); }
  }

  function editSub(projId, taskId, subId, val) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    const sub  = task?.subtasks.find(s => s.id === subId);
    if (sub && sub.text !== val) { sub.text = val; save(); }
  }

  function deleteSub(projId, taskId, subId) {
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (task) { task.subtasks = task.subtasks.filter(s => s.id !== subId); save(); renderAll(); }
  }

  function addSubtask(projId, taskId, inp) {
    const text = inp.value.trim();
    if (!text) return;
    const proj = data.projects.find(p => p.id === projId);
    const task = proj?.tasks.find(t => t.id === taskId);
    if (!task) return;
    if (!task.subtasks) task.subtasks = [];
    task.subtasks.push({ id: uid(), text, done: false });
    task._expanded = true;
    inp.value = '';
    save(); renderAll();
  }

  // ── Project actions ──
  function renameProject(projId, name) {
    const proj = data.projects.find(p => p.id === projId);
    if (proj && name.trim()) { proj.name = name.trim(); save(); }
  }

  function deleteProject(projId) {
    if (!confirm('Delete this project and all its tasks?')) return;
    data.projects = data.projects.filter(p => p.id !== projId);
    save(); renderAll();
  }

  // ── Project menu ──
  function toggleMenu(e, projId) {
    e.stopPropagation();
    closeAllMenus();
    const btn  = e.currentTarget;
    const wrap = btn.closest('.proj-menu-wrap');
    const dd   = document.createElement('div');
    dd.className = 'proj-dropdown';
    dd.id = 'dd_' + projId;
    dd.innerHTML = `
      <div class="dd-item" onclick="openEditProject('${projId}')">✏️ Edit</div>
      <div class="dd-item danger" onclick="deleteProject('${projId}')">🗑 Delete</div>`;
    wrap.appendChild(dd);
    setTimeout(() => document.addEventListener('click', closeAllMenus, { once: true }), 0);
  }

  function closeAllMenus() {
    document.querySelectorAll('.proj-dropdown').forEach(d => d.remove());
  }

  // ── Add / Edit Project Modal ──
  const COLORS  = ['#7c6af7','#ec4899','#34d399','#60a5fa','#f87171','#fb923c','#facc15','#a3e635','#2dd4bf','#e879f9'];
  const EMOJIS  = ['📚','⚙️','🧬','📐','💡','🎯','📝','🔬','💻','🎨','🏋️','🌍','📊','🎵','✨','🚀'];

  let modalMode = 'add'; // 'add' | 'edit'
  let editingProjId = null;
  let pickedColor = COLORS[0];
  let pickedEmoji = EMOJIS[0];

  function openAddProject() {
    modalMode = 'add'; editingProjId = null;
    pickedColor = COLORS[0]; pickedEmoji = EMOJIS[0];
    document.getElementById('projModalTitle').textContent = 'New Project';
    document.getElementById('projNameInp').value = '';
    renderModalPickers();
    document.getElementById('projModal').style.display = 'flex';
    setTimeout(() => document.getElementById('projNameInp').focus(), 50);
  }

  function openEditProject(projId) {
    const proj = data.projects.find(p => p.id === projId);
    if (!proj) return;
    modalMode = 'edit'; editingProjId = projId;
    pickedColor = proj.color; pickedEmoji = proj.icon;
    document.getElementById('projModalTitle').textContent = 'Edit Project';
    document.getElementById('projNameInp').value = proj.name;
    renderModalPickers();
    document.getElementById('projModal').style.display = 'flex';
  }

  function renderModalPickers() {
    const swatches = document.getElementById('colorSwatches');
    swatches.innerHTML = COLORS.map(c =>
      `<div class="swatch ${c === pickedColor ? 'picked' : ''}"
            style="background:${c}"
            onclick="pickColor('${c}')"></div>`
    ).join('');

    const emojiRow = document.getElementById('emojiRow');
    emojiRow.innerHTML = EMOJIS.map(e =>
      `<span class="emoji-opt ${e === pickedEmoji ? 'picked' : ''}" onclick="pickEmoji('${e}')">${e}</span>`
    ).join('');
  }

  function pickColor(c) { pickedColor = c; renderModalPickers(); }
  function pickEmoji(e) { pickedEmoji = e; renderModalPickers(); }

  function closeProjModal() { document.getElementById('projModal').style.display = 'none'; }

  function confirmProject() {
    const name = document.getElementById('projNameInp').value.trim();
    if (!name) { document.getElementById('projNameInp').focus(); return; }

    if (modalMode === 'add') {
      data.projects.push({ id: uid(), name, icon: pickedEmoji, color: pickedColor, tasks: [] });
    } else {
      const proj = data.projects.find(p => p.id === editingProjId);
      if (proj) { proj.name = name; proj.icon = pickedEmoji; proj.color = pickedColor; }
    }
    save(); closeProjModal(); renderAll();
  }

  // ── Keyboard shortcut: Enter confirms modal ──
  document.getElementById('projNameInp').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmProject();
    if (e.key === 'Escape') closeProjModal();
  });

  // ── Escape closes modal ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeProjModal();
  });

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ──
  renderAll();
</script>
</body>
</html>
